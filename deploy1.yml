apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-deployment
  namespace: thanu-ns
  labels:
    app: fitness
spec: 
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector: 
    matchLabels:
      app: fit
  template:
    metadata:
      labels:
        app: fit
    spec: 
      containers:
        - name: fitness-container
          image: muralisocial123/fitness:v1.0.1
          ports:
            - containerPort: 3000
